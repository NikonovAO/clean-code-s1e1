<!DOCTYPE html>
<html lang="en">
  <head>
    <title>
      Todo App
    </title>
    <link href="https://fonts.googleapis.com/css?family=Lato:300,400,700" rel="stylesheet">
    <link rel="stylesheet" href="style.css" media="screen">
  </head>
  <body>
    <!--Было <div class="aaa">-->
    <header class="banner">
      <img src="./eisenhower-matrix.jpg" alt="eisenhower-matrix">
      <!--Было <a class='more_inf'>-->
      <a class="banner__link" href="https://goal-life.com/page/method/matrix-eisenhower">
        Want more details?
      </a>
    </header>
    <main class="main-wrapper">
      <article class="add-item">
        <p id="add-item" class="add-item__title-wrapper">
          <label for="new-task" class="add-item__title">
            Add Item
          </label>
        </p>
        <!--Было <div class="task-row-wrapper">-->
        <div class="add-item__wrapper">
          <input id="new-task" class="add-item__task-input" type="text">
          <button class="button__add-item">
            Add
          </button>
        </div>
        <!--</p>-->
      </article>
      <article class="incomplete-tasks">
        <h3 class="incomplete-tasks__title">
          Todo
        </h3>
        <ul id="incomplete-tasks__list" class="incomplete-tasks__list">
          <li>
            <input type="checkbox" class="checkbox">
            <label class="task">
              Pay Bills
            </label>
            <input type="text">
            <!--Было <button class="edit">-->
            <button class="button__edit-item">
              Edit
            </button>
            <!--<button class="delete">-->
            <button class="button__delete-item">
              <img src="./remove.svg" alt="delete-item">
            </button>
          </li>
          <li class="edit-mode">
            <input type="checkbox" class="checkbox">
            <label class="task">
              Go Shopping
            </label>
            <input type="text" value="Go Shopping" class="task">
            <button class="button__edit-item">
              Save
            </button>
            <button class="button__delete-item">
              <img src="./remove.svg" alt="delete-item">
            </button>
          </li>
        </ul>
      </article>
      <article class="completed-tasks">
        <h3 class="completed-tasks__title">
          Completed
        </h3>
        <ul id="completed-tasks__list" class="completed-tasks__list">
          <li>
            <input type="checkbox" checked class="checkbox">
            <label class="task">
              See the Doctor
            </label>
            <input type="text" class="task">
            <button class="button__edit-item">
              Edit
            </button>
            <button class="button__delete-item">
              <img src="./remove.svg" alt="delete-item">
            </button>
          </li>
        </ul>
      </article>
    </main>
    <script src="app.js"></script>
  </body>
</html>
