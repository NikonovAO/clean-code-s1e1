<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>
      Todo App
    </title>
    <link href="https://fonts.googleapis.com/css?family=Lato:300,400,700" rel="stylesheet">
    <link rel="stylesheet" href="style.css" media="screen">
  </head>
  <body class="body-wrapper">
    <header class="banner">
      <img src="./eisenhower-matrix.jpg" alt="eisenhower-matrix" class="banner__img">
      <a class="banner__link" href="https://goal-life.com/page/method/matrix-eisenhower">
        Want more details?
      </a>
    </header>
    <main class="main-wrapper">
      <article class="add-item">
        <p id="add-item" class="add-item__title-wrapper">
          <label for="new-task" class="add-item__title">
            Add Item
          </label>
        </p>
        <div class="add-item__wrapper">
          <input id="new-task" class="task__entry-field" type="text">
          <button class="button--add-item">
            Add
          </button>
        </div>
      </article>
      <article class="incomplete-tasks">
        <h3 class="incomplete-tasks__title">
          Todo
        </h3>
        <ul id="incomplete-tasks__list" class="incomplete-tasks__list">
          <li class="tasks__item">
            <input type="checkbox" class="task__checkbox">
            <label class="task__name">
              Pay Bills
            </label>
            <input type="text" class="task__entry-field">
            <button class="button--edit-item">
              Edit
            </button>
            <button class="button--delete-item">
              <img src="./remove.svg" alt="delete-item" class="delete-item__img">
            </button>
          </li>
          <li class="edit-mode tasks__item">
            <input type="checkbox" class="task__checkbox">
            <label class="task__name">
              Go Shopping
            </label>
            <input type="text" value="Go Shopping" class="task__entry-field">
            <button class="button--edit-item">
              Save
            </button>
            <button class="button--delete-item">
              <img src="./remove.svg" alt="delete-item" class="delete-item__img">
            </button>
          </li>
        </ul>
      </article>
      <article class="completed-tasks">
        <h3 class="completed-tasks__title">
          Completed
        </h3>
        <ul id="completed-tasks__list" class="completed-tasks__list">
          <li class="tasks__item">
            <input type="checkbox" checked class="task__checkbox">
            <label class="task__name">
              See the Doctor
            </label>
            <input type="text" class="task__entry-field">
            <button class="button--edit-item">
              Edit
            </button>
            <button class="button--delete-item">
              <img src="./remove.svg" alt="delete-item" class="delete-item__img">
            </button>
          </li>
        </ul>
      </article>
    </main>
    <script src="app.js"></script>
  </body>
</html>
